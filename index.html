<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ezio Bypass — تحميل مباشر</title>
<link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/197620658?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;--bg2:#0a0f1a;
  --card:rgba(255,255,255,0.022);--card-h:rgba(255,255,255,0.045);
  --brd:rgba(255,255,255,0.055);--brd-h:rgba(255,255,255,0.12);
  --t1:#f0f2f7;--t2:#8b91a8;--t3:#4a5072;
  --acc:#10b981;--acc2:#34d399;
  --gold:#c9975c;--gold2:#d4a574;
  --rec:#f59e0b;--rec2:#fbbf24;
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:var(--bg);color:var(--t1);
  min-height:100vh;direction:rtl;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
}

/* ── Loading Screen ── */
.ld-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 0.5s,visibility 0.5s;
}
.ld-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.ld-ac{width:60px;height:72px;margin-bottom:28px;opacity:0.7;animation:ldFloat 3s ease-in-out infinite}
@keyframes ldFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ld-bar-wrap{width:200px;height:3px;background:rgba(255,255,255,0.05);border-radius:100px;overflow:hidden;margin-bottom:16px}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:100px;animation:ldBar 1.5s ease-in-out forwards}
@keyframes ldBar{0%{width:0%}50%{width:70%}100%{width:100%}}
.ld-text{font-size:13px;color:var(--t3);font-weight:600}

/* ── Error Screen ── */
.err-screen{
  position:fixed;inset:0;z-index:9998;
  background:var(--bg);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px;
}
.err-screen.active{display:flex}
.err-card{
  background:var(--card);border:1px solid rgba(239,68,68,0.2);
  border-radius:24px;padding:clamp(28px,6vw,48px) clamp(20px,5vw,40px);
  text-align:center;max-width:420px;width:100%;
  animation:errIn 0.6s cubic-bezier(0.16,1,0.3,1);
}
@keyframes errIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.err-icon{
  width:56px;height:56px;margin:0 auto 16px;
  background:rgba(239,68,68,0.08);border:2px solid rgba(239,68,68,0.2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  animation:errShake 0.5s 0.2s both;
}
@keyframes errShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.err-icon svg{width:26px;height:26px;color:#ef4444}
.err-title{font-size:20px;font-weight:800;color:#ef4444;margin-bottom:8px}
.err-sub{font-size:13px;color:var(--t3);margin-bottom:24px;line-height:1.6}
.err-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:#fff;border:none;padding:14px 28px;border-radius:14px;
  font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
  transition:all 0.3s;min-height:52px;
}
.err-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(239,68,68,0.3)}

/* ── Ambient ── */
.ez-ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ez-orb{position:absolute;border-radius:50%;filter:blur(80px)}
.ez-orb--1{
  width:min(600px,90vw);height:min(600px,90vw);top:-200px;right:-150px;
  background:radial-gradient(circle,rgba(16,185,129,0.1),transparent 70%);
}
.ez-orb--2{
  width:min(500px,80vw);height:min(500px,80vw);bottom:-150px;left:-100px;
  background:radial-gradient(circle,rgba(129,140,248,0.07),transparent 70%);
}
.ez-orb--3{
  width:min(400px,70vw);height:min(400px,70vw);top:40%;left:50%;
  background:radial-gradient(circle,rgba(201,151,92,0.05),transparent 70%);
}
body.desktop .ez-orb--1{animation:orbF1 20s ease-in-out infinite}
body.desktop .ez-orb--2{animation:orbF2 25s ease-in-out infinite}
body.desktop .ez-orb--3{animation:orbF3 18s ease-in-out infinite}
@keyframes orbF1{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,40px)}}
@keyframes orbF2{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-60px)}}
@keyframes orbF3{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,30px)}}

/* ── Particles ── */
.ez-particles{position:fixed;inset:0;pointer-events:none;z-index:0}
body.mobile .ez-particles{display:none}
.ez-pt{
  position:absolute;width:2px;height:2px;
  background:var(--gold);border-radius:50%;opacity:0;
  animation:ptFloat linear infinite;
}
@keyframes ptFloat{
  0%{opacity:0;transform:translateY(100vh) scale(0)}
  10%{opacity:0.6}90%{opacity:0.6}
  100%{opacity:0;transform:translateY(-20vh) scale(1)}
}

/* ── Synth Lines ── */
.ez-synth{position:fixed;inset:0;pointer-events:none;z-index:0}
body.mobile .ez-synth{display:none}
.ez-sl{
  position:absolute;height:1px;opacity:0.03;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  animation:slSlide 12s linear infinite;
}
@keyframes slSlide{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── Container ── */
.ezwrap{position:relative;z-index:1;max-width:740px;margin:0 auto;padding:40px 24px 80px;opacity:0}
.ezwrap.visible{animation:wrapIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes wrapIn{from{opacity:0}to{opacity:1}}
body.mobile .ezwrap{padding:24px 16px 60px}

/* ── Header ── */
.ezhdr{text-align:center;margin-bottom:32px;animation:fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) both}
.ezhdr__brand{display:inline-flex;align-items:center;gap:14px;margin-bottom:20px}
.ezhdr__brand-icon{position:relative}
.ezhdr__brand-glow{
  position:absolute;inset:-8px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,151,92,0.2),transparent 70%);
}
body.desktop .ezhdr__brand-glow{animation:bGlow 3s ease-in-out infinite}
@keyframes bGlow{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
.ezhdr__ac-svg{width:48px;height:58px;opacity:0.7}
body.desktop .ezhdr__ac-svg{animation:acFloat 6s ease-in-out infinite}
@keyframes acFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.ezhdr__brand-right{text-align:start}
.ezhdr__brand-text{
  font-size:24px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--gold2) 0%,#e8c591 25%,var(--gold) 50%,#a07840 75%,var(--gold2) 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
body.desktop .ezhdr__brand-text{animation:goldShim 4s linear infinite}
@keyframes goldShim{0%{background-position:0% center}100%{background-position:300% center}}
.ezhdr__brand-sub{font-size:10px;font-weight:600;color:var(--gold);opacity:0.5;letter-spacing:3px;font-family:'JetBrains Mono',monospace}
.ezhdr__status{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12);
  padding:6px 18px;border-radius:100px;margin-bottom:24px;
  font-size:12px;font-weight:600;color:var(--acc);
}
.ezhdr__dot{
  width:7px;height:7px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 10px rgba(16,185,129,0.5);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.ezhdr__title{font-size:26px;font-weight:800;color:#fff;line-height:1.35;margin-bottom:14px;letter-spacing:-0.3px}
body.mobile .ezhdr__title{font-size:20px}

/* ── Tags ── */
.eztags{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:16px}
.eztag{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:10px;
  font-size:12px;font-weight:700;border:1px solid;
}
body.desktop .eztag{animation:tagPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.eztag:nth-child(1){animation-delay:0.2s}.eztag:nth-child(2){animation-delay:0.3s}
.eztag:nth-child(3){animation-delay:0.4s}.eztag:nth-child(4){animation-delay:0.5s}
@keyframes tagPop{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
.eztag--type{background:rgba(129,140,248,0.08);border-color:rgba(129,140,248,0.2);color:#818cf8}
.eztag--season{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.2);color:#10b981}
.eztag--episode{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.2);color:#fbbf24}
.eztag--lang{background:rgba(244,114,182,0.08);border-color:rgba(244,114,182,0.2);color:#f472b6}
body.mobile .eztags{gap:6px}
body.mobile .eztag{font-size:11px;padding:4px 10px}

/* ── Dates ── */
.ezdates{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.ezdate{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);font-weight:500}
.ezdate svg{opacity:0.5;flex-shrink:0}

/* ── Eagle Divider ── */
.ez-eagle{display:block;margin:0 auto;width:100px;height:50px;opacity:0.3}
body.desktop .ez-eagle{animation:eagleSoar 8s ease-in-out infinite}
@keyframes eagleSoar{0%,100%{transform:translateX(0) scale(1)}50%{transform:translateX(-10px) scale(1.05)}}

/* ── Stats ── */
.ezstats{display:flex;justify-content:center;gap:10px;margin:28px 0 36px;animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both}
body.mobile .ezstats{gap:6px}
.ezstat{
  background:var(--card);border:1px solid var(--brd);
  border-radius:16px;padding:18px 28px;text-align:center;flex:1;max-width:170px;
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;
}
body.mobile .ezstat{padding:14px 12px;border-radius:12px}
.ezstat::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(16,185,129,0.04),transparent);opacity:0;transition:opacity 0.3s}
.ezstat:hover{border-color:var(--brd-h);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.2)}
.ezstat:hover::before{opacity:1}
.ezstat__val{
  font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
body.mobile .ezstat__val{font-size:22px}
.ezstat__lbl{font-size:11px;color:var(--t3);margin-top:4px;font-weight:600;letter-spacing:0.3px}

/* ── AC Divider ── */
.ezdiv{display:flex;align-items:center;gap:12px;margin:24px 0;opacity:0.3}
.ezdiv__line{flex:1;height:1px;background:linear-gradient(to left,transparent,var(--gold),transparent)}
.ezdiv__diamond{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);border-radius:1px}

/* ── Sections ── */
.ezsec{margin-bottom:32px;animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both}
.ezsec__head{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
body.mobile .ezsec__head{flex-wrap:wrap;gap:10px}
.ezsec__qbadge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:12px;color:#fff;flex-shrink:0;
  position:relative;overflow:hidden;
}
.ezsec__qbadge::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);opacity:0;transition:opacity 0.3s}
.ezsec__qbadge:hover::after{opacity:1}
.ezsec__qnum{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.ezsec__qtag{font-size:10px;font-weight:700;opacity:0.8;letter-spacing:1.2px}
.ezsec__info{display:flex;align-items:center;gap:14px;flex-shrink:0}
.ezsec__count{font-size:12px;color:var(--t2);font-weight:600}
.ezsec__size{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);font-weight:500;
  background:var(--card);border:1px solid var(--brd);padding:4px 12px;border-radius:8px;
}
.ezsec__line{flex:1;height:1px;background:linear-gradient(to left,transparent,var(--brd))}
body.mobile .ezsec__line{display:none}
.ezsec__cards{display:flex;flex-direction:column;gap:8px}

/* ── Cards ── */
.ezc{
  position:relative;display:flex;align-items:center;gap:14px;
  padding:16px 18px;background:var(--card);border:1px solid var(--brd);
  border-radius:16px;text-decoration:none;color:var(--t1);
  cursor:pointer;overflow:hidden;
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
  animation:cardIn 0.55s cubic-bezier(0.16,1,0.3,1) both;
}
body.mobile .ezc{padding:14px 12px;border-radius:14px}
.ezc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(16,185,129,0.03),transparent);opacity:0;transition:opacity 0.3s;border-radius:16px}
.ezc::after{content:'';position:absolute;top:0;right:0;width:150px;height:150px;background:radial-gradient(circle,rgba(16,185,129,0.06),transparent 70%);opacity:0;transition:opacity 0.4s;transform:translate(30%,-30%)}
.ezc:hover{border-color:var(--brd-h);transform:translateX(-6px);box-shadow:0 10px 40px rgba(0,0,0,0.25)}
.ezc:hover::before,.ezc:hover::after{opacity:1}
.ezc:active{transform:translateX(-3px) scale(0.995)}
@keyframes cardIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

/* Recommended */
.ezc--rec{background:linear-gradient(135deg,rgba(245,158,11,0.03),rgba(201,151,92,0.02),rgba(16,185,129,0.02));border-color:rgba(201,151,92,0.2)}
.ezc--rec::before{background:linear-gradient(135deg,rgba(201,151,92,0.05),rgba(245,158,11,0.03),transparent)}
.ezc--rec::after{background:radial-gradient(circle,rgba(201,151,92,0.08),transparent 70%)}
.ezc--rec:hover{border-color:rgba(201,151,92,0.4);box-shadow:0 10px 40px rgba(0,0,0,0.25),0 0 40px rgba(201,151,92,0.06)}

.ezc__badge{
  position:absolute;top:0;left:0;display:flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,var(--gold),#a07840);
  color:#fff;font-size:10px;font-weight:700;
  padding:4px 12px 4px 8px;border-radius:0 0 12px 0;
  letter-spacing:0.3px;box-shadow:0 3px 12px rgba(201,151,92,0.3);
}
.ezc__icon{
  width:48px;height:48px;border-radius:14px;
  background:var(--card);border:1px solid var(--brd);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;position:relative;z-index:1;transition:all 0.35s;
}
body.mobile .ezc__icon{width:42px;height:42px;font-size:18px;border-radius:12px}
.ezc:hover .ezc__icon{border-color:var(--brd-h);transform:scale(1.08)}
.ezc__icon--rec{background:rgba(201,151,92,0.08);border-color:rgba(201,151,92,0.2)}
.ezc--rec:hover .ezc__icon--rec{border-color:rgba(201,151,92,0.4);box-shadow:0 0 20px rgba(201,151,92,0.12)}
.ezc__body{flex:1;min-width:0;position:relative;z-index:1}
.ezc__name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.ezc__desc{font-size:11px;color:var(--t3);font-weight:500}
.ezc__speed{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);
  color:var(--acc);font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:10px;position:relative;z-index:1;flex-shrink:0;
}
body.mobile .ezc__speed{padding:4px 8px;font-size:10px}
body.desktop .ezc__speed{animation:speedP 3s ease-in-out infinite}
@keyframes speedP{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,0.1)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0.05)}}
.ezc__arrow{
  color:var(--t3);opacity:0;transform:translateX(10px);
  transition:all 0.35s cubic-bezier(0.16,1,0.3,1);position:relative;z-index:1;flex-shrink:0;
}
.ezc:hover .ezc__arrow{opacity:1;transform:translateX(0);color:var(--acc)}
.ezc--rec:hover .ezc__arrow{color:var(--gold)}

/* ── Footer ── */
.ezftr{text-align:center;margin-top:48px;padding-top:28px;border-top:1px solid var(--brd);animation:fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.6s both}
.ezftr__ac{width:40px;height:48px;margin:0 auto 12px;opacity:0.5}
.ezftr__txt{font-size:12px;color:var(--t3)}
.ezftr__txt a{color:var(--gold);text-decoration:none;font-weight:700}
.ezftr__ver{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);background:var(--card);border:1px solid var(--brd);padding:3px 12px;border-radius:8px;margin-top:10px}
.ezftr__creed{font-size:10px;color:var(--gold);opacity:0.4;font-style:italic;margin-top:12px;letter-spacing:0.5px}

/* ── Animations ── */
@keyframes fadeDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes checkPop{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1)}}
@keyframes checkRing{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.15);opacity:0}}
@keyframes statusFade{from{opacity:0}to{opacity:1}}
@keyframes progBar{0%{width:0%}60%{width:85%}100%{width:100%}}
@keyframes errShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="ld-screen" id="ldScreen">
  <svg viewBox="0 0 100 120" fill="none" class="ld-ac">
    <path d="M50 8 L20 95 L35 75 L50 105 L65 75 L80 95 Z" stroke="url(#ldG)" stroke-width="2" fill="none"/>
    <path d="M50 25 L32 80 L42 68 L50 85 L58 68 L68 80 Z" fill="url(#ldG)" opacity="0.15"/>
    <defs><linearGradient id="ldG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#d4a574"/><stop offset="50%" stop-color="#c9975c"/><stop offset="100%" stop-color="#a07840"/></linearGradient></defs>
  </svg>
  <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  <div class="ld-text">جاري تحضير الروابط...</div>
</div>

<!-- Error Screen -->
<div class="err-screen" id="errScreen">
  <div class="err-card">
    <div class="err-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <h2 class="err-title">لا توجد بيانات</h2>
    <p class="err-sub">لم يتم العثور على بيانات التحميل.<br>يرجى العودة لصفحة التحميل والمحاولة مرة أخرى.</p>
    <button class="err-btn" onclick="history.back()">العودة</button>
  </div>
</div>

<!-- Ambient -->
<div class="ez-ambient">
  <div class="ez-orb ez-orb--1"></div>
  <div class="ez-orb ez-orb--2"></div>
  <div class="ez-orb ez-orb--3"></div>
</div>
<div class="ez-synth" id="synthWrap"></div>
<div class="ez-particles" id="ptWrap"></div>

<!-- Main Content -->
<div class="ezwrap" id="mainWrap"></div>

<script>
(function(){
  "use strict";

  const mobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

  // ── Decode data from URL hash ──
     function decodePayload(){
    const hash = location.hash.slice(1);
    if(!hash) return null;
    try{
      const json = decodeURIComponent(atob(hash));
      return JSON.parse(json);
    }catch{
      // Try URL params as fallback
      try{
        const params = new URLSearchParams(location.search);
        const d = params.get("d");
        if(!d) return null;
        return JSON.parse(decodeURIComponent(atob(d)));
      }catch{ return null; }
    }
  }

  // ── Render ──

  // ── Init (REPLACE THE OLD ONE) ──
  function init(){
    const data = decodePayload();
    if(!data){
      setTimeout(showError, 1600);
      return;
    }

    setTimeout(()=>{
      // Route based on payload mode
      if(data.mode === "direct"){
        renderDirect(data);
      } else if(data.mode === "error"){
        renderErrorPage();
      } else if(data.groups){
        render(data);
      } else {
        showError();
      }
    }, 1500);
  }

  // Run
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

})();
</script>
