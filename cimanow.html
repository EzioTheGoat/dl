<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ezio — CimaNow Bypass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #030014;
      --surface: rgba(15, 15, 40, 0.75);
      --surface2: rgba(25, 25, 60, 0.6);
      --border: rgba(255, 255, 255, 0.07);
      --border-accent: rgba(99, 102, 241, 0.25);
      --text: #f0f0ff;
      --text-muted: rgba(200, 200, 255, 0.45);
      --text-dim: rgba(200, 200, 255, 0.25);
      --accent: #6366f1;
      --accent2: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --green: #34d399;
      --green-bg: rgba(52, 211, 153, 0.1);
      --green-border: rgba(52, 211, 153, 0.25);
      --red: #f87171;
      --red-bg: rgba(248, 113, 113, 0.08);
      --gold: #fbbf24;
      --gold-bg: rgba(251, 191, 36, 0.1);
      --blue: #60a5fa;
      --blue-bg: rgba(96, 165, 250, 0.1);
      --purple: #a78bfa;
      --purple-bg: rgba(167, 139, 250, 0.1);
      --radius: 20px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --blur: blur(24px);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Animated Background ───────────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: drift 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.5), transparent 70%);
      top: -200px; left: -200px;
      animation-delay: 0s; animation-duration: 25s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,92,246,0.4), transparent 70%);
      bottom: -100px; right: -150px;
      animation-delay: -8s; animation-duration: 20s;
    }
    .orb-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(236,72,153,0.25), transparent 70%);
      top: 40%; left: 60%;
      animation-delay: -15s; animation-duration: 30s;
    }
    .orb-4 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(52,211,153,0.2), transparent 70%);
      top: 20%; right: 20%;
      animation-delay: -5s; animation-duration: 22s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(60px, -40px) scale(1.05); }
      50% { transform: translate(-30px, 60px) scale(0.95); }
      75% { transform: translate(40px, 20px) scale(1.02); }
    }

    /* Grid noise texture */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ─── Layout ────────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ─── Header ────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      padding: 18px 28px;
      background: var(--surface);
      border: 1px solid var(--border-accent);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      animation: slideDown 0.5s ease both;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 24px var(--accent-glow);
      flex-shrink: 0;
    }

    .header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 11px; font-weight: 700;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-border);
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 1.5s ease infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.8)} }

    /* ─── Media Card ────────────────────────────────────────────── */
    .media-card {
      padding: 28px 32px;
      margin-bottom: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      animation: fadeUp 0.5s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }

    .media-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    .media-info { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; }

    .media-icon-wrap {
      width: 64px; height: 64px; flex-shrink: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.2));
      border: 1px solid rgba(99,102,241,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }

    .media-details { flex: 1; min-width: 0; }
    .media-title {
      font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
      line-height: 1.3;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .media-title.rtl { direction: rtl; }

    .media-tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.3px;
    }
    .tag-type   { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(167,139,250,.2); }
    .tag-season { background: var(--blue-bg);   color: var(--blue);   border: 1px solid rgba(96,165,250,.2); }
    .tag-ep     { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-border); }
    .tag-year   { background: var(--gold-bg);   color: var(--gold);   border: 1px solid rgba(251,191,36,.2); }
    .tag-trans  { background: var(--red-bg);    color: var(--red);    border: 1px solid rgba(248,113,113,.2); }

    /* ─── Stats Bar ─────────────────────────────────────────────── */
    .stats-bar {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 28px;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .stat-card {
      flex: 1; min-width: 100px;
      padding: 16px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      backdrop-filter: var(--blur);
      text-align: center;
    }
    .stat-num { font-size: 26px; font-weight: 900; color: var(--accent2); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }

    /* ─── Group Section ─────────────────────────────────────────── */
    .groups-wrapper { display: flex; flex-direction: column; gap: 20px; }

    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      background: rgba(99,102,241,.06);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .group-header:hover { background: rgba(99,102,241,.1); }

    .group-header-left { display: flex; align-items: center; gap: 12px; }

    .group-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 14px;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .group-name { font-size: 15px; font-weight: 800; }
    .group-count {
      font-size: 11px; color: var(--text-muted);
      background: rgba(99,102,241,.12);
      padding: 2px 8px; border-radius: 50px;
      border: 1px solid rgba(99,102,241,.15);
      margin-top: 1px;
    }

    .group-chevron {
      color: var(--text-muted);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      flex-shrink: 0;
    }
    .group-card.collapsed .group-chevron { transform: rotate(-90deg); }

    .group-links {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      transition: all 0.3s;
    }
    .group-card.collapsed .group-links { display: none; }

    /* ─── Link Button ───────────────────────────────────────────── */
    .link-btn {
      display: flex; flex-direction: column;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      gap: 6px;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(139,92,246,.04));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .link-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(99,102,241,.2);
    }
    .link-btn:hover::before { opacity: 1; }

    .link-btn:active { transform: translateY(-1px); }

    .link-top {
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
    }

    .quality-badge {
      font-size: 13px; font-weight: 900; letter-spacing: -0.3px;
      padding: 3px 10px;
      border-radius: 7px;
    }
    .q-1080 { background: rgba(251,191,36,.15); color: var(--gold); border: 1px solid rgba(251,191,36,.25); }
    .q-720  { background: rgba(96,165,250,.12); color: var(--blue); border: 1px solid rgba(96,165,250,.2); }
    .q-480  { background: rgba(52,211,153,.1);  color: var(--green); border: 1px solid var(--green-border); }
    .q-360  { background: rgba(200,200,255,.07); color: var(--text-muted); border: 1px solid var(--border); }
    .q-default { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .link-arrow {
      width: 26px; height: 26px;
      border-radius: 8px;
      background: rgba(99,102,241,.12);
      border: 1px solid rgba(99,102,241,.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent2);
      transition: all 0.25s;
      flex-shrink: 0;
    }
    .link-btn:hover .link-arrow {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: translateX(-3px) rotate(-45deg);
    }

    .link-name {
      font-size: 13px; color: var(--text-muted); font-weight: 500;
      position: relative; z-index: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .link-size {
      font-size: 11px; color: var(--text-dim); font-weight: 400;
      position: relative; z-index: 1;
    }

    .link-url-preview {
      font-size: 10px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      direction: ltr; text-align: left;
      position: relative; z-index: 1;
      margin-top: 2px;
    }

    /* Copy animation ripple */
    .link-btn.copied {
      border-color: var(--green) !important;
      box-shadow: 0 0 0 2px var(--green-border) !important;
    }

    /* ─── Empty / Error States ──────────────────────────────────── */
    .state-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px;
      min-height: 320px;
      text-align: center;
      padding: 48px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      animation: fadeUp 0.5s ease both;
    }

    .state-icon {
      width: 72px; height: 72px;
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .state-icon-loading { background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.2); }
    .state-icon-error   { background: var(--red-bg);      border: 1px solid rgba(248,113,113,.2); }
    .state-icon-empty   { background: var(--gold-bg);     border: 1px solid rgba(251,191,36,.2); }

    .state-title { font-size: 20px; font-weight: 900; }
    .state-desc  { font-size: 14px; color: var(--text-muted); line-height: 1.8; max-width: 380px; }

    /* Spinner */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(99,102,241,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Toolbar (copy all / expand/collapse) ──────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
      margin-bottom: 16px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .toolbar-title { font-size: 16px; font-weight: 800; color: var(--text); }
    .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 12px; font-weight: 700;
      cursor: pointer; border: none;
      font-family: inherit;
      transition: all 0.25s;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff;
      box-shadow: 0 6px 20px var(--accent-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px var(--accent-glow); }

    .btn-ghost {
      background: rgba(255,255,255,.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.08); color: var(--text); transform: translateY(-2px); }

    /* ─── Toast ─────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      z-index: 9999;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 13px; font-weight: 700;
      background: rgba(15, 15, 40, 0.92);
      border: 1px solid var(--green-border);
      color: var(--green);
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      opacity: 0;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── Footer ────────────────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .footer a { color: var(--accent2); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* ─── Animations ────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Loading overlay ───────────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px;
      background: var(--bg);
      transition: opacity 0.5s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      width: 72px; height: 72px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      box-shadow: 0 16px 48px var(--accent-glow);
      animation: loadPulse 1.5s ease infinite;
    }
    @keyframes loadPulse {
      0%,100% { box-shadow: 0 16px 48px var(--accent-glow); }
      50% { box-shadow: 0 16px 64px rgba(99,102,241,.6); }
    }
    .loading-text { font-size: 15px; font-weight: 700; color: var(--text-muted); }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .page { padding: 16px 12px 60px; }
      .header { padding: 14px 18px; }
      .media-card { padding: 20px 18px; }
      .group-links { grid-template-columns: 1fr 1fr; }
      .stats-bar { gap: 8px; }
      .stat-card { padding: 12px 14px; }
      .stat-num { font-size: 20px; }
      .media-title { font-size: 17px; }
    }

    @media (max-width: 380px) {
      .group-links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ── Background ──────────────────────────────────────────────── -->
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- ── Loading Overlay ─────────────────────────────────────────── -->
  <div id="loading-overlay">
    <div class="loading-logo">🦅</div>
    <div class="loading-text">جارٍ تحميل الروابط…</div>
    <div class="spinner"></div>
  </div>

  <!-- ── Page ────────────────────────────────────────────────────── -->
  <div class="page" id="app" style="display:none;">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">🦅</div>
        <div>
          <div class="header-title">Ezio — CimaNow Bypass</div>
          <div class="header-sub" id="header-sub">روابط التحميل المستخرجة</div>
        </div>
      </div>
      <div class="badge">
        <span class="badge-dot"></span>
        <span id="header-badge-text">مكتمل</span>
      </div>
    </header>

    <!-- Media Info Card -->
    <div class="media-card" id="media-card" style="display:none;">
      <div class="media-info">
        <div class="media-icon-wrap" id="media-icon">🎬</div>
        <div class="media-details">
          <div class="media-title" id="media-title">—</div>
          <div class="media-tags" id="media-tags"></div>
        </div>
      </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar" style="display:none;">
      <div class="stat-card">
        <div class="stat-num" id="stat-links">0</div>
        <div class="stat-label">رابط</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-groups">0</div>
        <div class="stat-label">مجموعة</div>
      </div>
      <div class="stat-card" id="stat-ep-card" style="display:none;">
        <div class="stat-num" id="stat-ep">—</div>
        <div class="stat-label">حلقة</div>
      </div>
      <div class="stat-card" id="stat-year-card" style="display:none;">
        <div class="stat-num" id="stat-year">—</div>
        <div class="stat-label">سنة</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display:none;">
      <div class="toolbar-title">روابط التحميل</div>
      <div class="toolbar-actions">
        <button class="btn btn-ghost" id="btn-expand-all" onclick="expandAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 11 12 6 17 11"/><polyline points="7 17 12 12 17 17"/></svg>
          فتح الكل
        </button>
        <button class="btn btn-ghost" id="btn-copy-all" onclick="copyAllLinks()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          نسخ الكل
        </button>
      </div>
    </div>

    <!-- Groups Container -->
    <div class="groups-wrapper" id="groups-container"></div>

    <!-- State card (loading / error / empty) -->
    <div id="state-container"></div>

    <!-- Footer -->
    <div class="footer">
      <p>صُنع بـ ❤️ بواسطة <strong>Ezio Auditore</strong> — CimaNow Bypass v6.3</p>
      <p style="margin-top:6px;">
        <a href="https://github.com/EzioTheGoat/EzioUserscripts" target="_blank">GitHub</a>
        &nbsp;·&nbsp;
        <a href="https://raw.githubusercontent.com/EzioTheGoat/EzioUserscripts/main/bypass-cimanow.user.js" target="_blank">تثبيت السكريبت</a>
      </p>
    </div>

  </div><!-- /#app -->

  <!-- Toast -->
  <div id="toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toast-msg">تم النسخ!</span>
  </div>

<script>
(function () {
  "use strict";

  var DATA_KEY      = "ezio_cimanow_data";
  var CHANNEL_NAME  = "ezio_cimanow_channel";
  var payload       = null;

  /* ── 1. Read payload ──────────────────────────────────────────── */
  function readPayload() {
    // a) URL hash (base64 encoded)
    try {
      var hash = location.hash.slice(1);
      if (hash && hash.length > 20) {
        var decoded = JSON.parse(decodeURIComponent(atob(hash)));
        if (decoded && decoded.links) return decoded;
      }
    } catch (e) {}

    // b) localStorage
    try {
      var raw = localStorage.getItem(DATA_KEY);
      if (raw) {
        var p = JSON.parse(raw);
        if (p && p.links) return p;
      }
    } catch (e) {}

    return null;
  }

  /* ── 2. Bootstrap ─────────────────────────────────────────────── */
  function bootstrap() {
    payload = readPayload();

    if (payload) {
      render(payload);
      return;
    }

    // Wait for BroadcastChannel message
    try {
      var bc = new BroadcastChannel(CHANNEL_NAME);
      bc.onmessage = function (evt) {
        if (evt.data && evt.data.type === "ezio_cimanow_payload" && evt.data.payload) {
          bc.close();
          payload = evt.data.payload;
          render(payload);
        }
      };
    } catch (e) {}

    // Poll localStorage as a fallback
    var pollAttempts = 0;
    var pollTimer = setInterval(function () {
      pollAttempts++;
      var p = readPayload();
      if (p) {
        clearInterval(pollTimer);
        payload = p;
        render(payload);
        return;
      }
      if (pollAttempts >= 20) {
        clearInterval(pollTimer);
        showError("لم يتم تلقي أي بيانات من الصفحة الأصلية.", "تأكد من تثبيت الامتداد وإعادة المحاولة من صفحة المشاهدة.");
      }
    }, 500);
  }

  /* ── 3. Render ────────────────────────────────────────────────── */
  function render(p) {
    hideLoading();
    show("app");

    var links = p.links || {};
    var media = p.media || {};

    renderMedia(media);
    renderStats(links, media);

    var groupKeys = Object.keys(links);
    if (!groupKeys.length) {
      showEmpty();
      return;
    }

    show("toolbar");
    var container = document.getElementById("groups-container");
    container.innerHTML = "";

    groupKeys.forEach(function (gk, gi) {
      container.appendChild(buildGroupCard(gk, links[gk], gi));
    });
  }

  /* ── 3a. Media Info ───────────────────────────────────────────── */
  function renderMedia(media) {
    if (!media) return;

    var hasInfo = media.title || media.type || media.season != null || media.episode != null || media.year;
    if (!hasInfo) return;

    show("media-card");

    // Icon
    var icons = { movie: "🎬", series: "📺", anime: "🎌", show: "📡" };
    var iconEl = document.getElementById("media-icon");
    iconEl.textContent = icons[media.type] || "🎬";

    // Title
    var titleEl = document.getElementById("media-title");
    var titleText = media.title || "";
    if (titleText) {
      titleEl.textContent = titleText;
      // Detect Arabic text
      if (/[\u0600-\u06FF]/.test(titleText)) titleEl.classList.add("rtl");
    } else {
      titleEl.textContent = typeLabel(media.type);
    }

    // Tags
    var tagsEl = document.getElementById("media-tags");
    tagsEl.innerHTML = "";

    if (media.type) {
      tagsEl.appendChild(makeTag(typeLabel(media.type), "tag-type", "🎭"));
    }
    if (media.season != null) {
      tagsEl.appendChild(makeTag("الموسم " + media.season, "tag-season", "📂"));
    }
    if (media.episode != null) {
      tagsEl.appendChild(makeTag("الحلقة " + media.episode, "tag-ep", "▶️"));
    }
    if (media.year) {
      tagsEl.appendChild(makeTag(media.year, "tag-year", "📅"));
    }
    if (media.trans) {
      tagsEl.appendChild(makeTag(media.trans, "tag-trans", "💬"));
    }
  }

  function typeLabel(type) {
    var map = { movie: "فيلم", series: "مسلسل", anime: "أنمي", show: "برنامج" };
    return map[type] || type || "محتوى";
  }

  function makeTag(text, cls, emoji) {
    var span = document.createElement("span");
    span.className = "tag " + cls;
    span.innerHTML = (emoji ? '<span style="font-size:11px">' + emoji + '</span> ' : "") + escHtml(text);
    return span;
  }

  /* ── 3b. Stats ────────────────────────────────────────────────── */
  function renderStats(links, media) {
    var groupKeys = Object.keys(links);
    var totalLinks = 0;
    groupKeys.forEach(function (k) { totalLinks += links[k].length; });

    document.getElementById("stat-links").textContent  = totalLinks;
    document.getElementById("stat-groups").textContent = groupKeys.length;

    if (media.episode != null) {
      document.getElementById("stat-ep").textContent = media.episode;
      show("stat-ep-card");
    }
    if (media.year) {
      document.getElementById("stat-year").textContent = media.year;
      show("stat-year-card");
    }

    show("stats-bar");

    document.getElementById("header-sub").textContent =
      totalLinks + " رابط في " + groupKeys.length + " مجموعة";
  }

  /* ── 3c. Group Card ───────────────────────────────────────────── */
  var groupIcons = ["📦", "🗂", "💾", "📁", "🗃", "📂", "🔗", "💿"];

  function buildGroupCard(groupName, linksArr, index) {
    var card = document.createElement("div");
    card.className = "group-card";
    card.style.animationDelay = (index * 0.07) + "s";

    // Header
    var header = document.createElement("div");
    header.className = "group-header";
    header.innerHTML =
      '<div class="group-header-left">' +
        '<div class="group-icon">' + (groupIcons[index % groupIcons.length]) + '</div>' +
        '<div>' +
          '<div class="group-name">' + escHtml(groupName) + '</div>' +
          '<div class="group-count">' + linksArr.length + ' رابط</div>' +
        '</div>' +
      '</div>' +
      '<svg class="group-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

    header.addEventListener("click", function () {
      card.classList.toggle("collapsed");
    });

    // Links grid
    var grid = document.createElement("div");
    grid.className = "group-links";

    linksArr.forEach(function (link) {
      grid.appendChild(buildLinkBtn(link));
    });

    card.appendChild(header);
    card.appendChild(grid);
    return card;
  }

  /* ── 3d. Link Button ──────────────────────────────────────────── */
  function buildLinkBtn(link) {
    var a = document.createElement("a");
    a.className = "link-btn";
    a.href = link.url || "#";
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.title = link.url || "";

    var qClass = qualityClass(link.quality);
    var qLabel = link.quality || "DL";
    var displayName = link.name || "تحميل";
    var sizeStr = link.size ? link.size : "";
    var urlPreview = link.url ? link.url.replace(/^https?:\/\//,'').substring(0, 36) + (link.url.length > 36 ? "…" : "") : "";

    a.innerHTML =
      '<div class="link-top">' +
        '<span class="quality-badge ' + qClass + '">' + escHtml(qLabel) + '</span>' +
        '<span class="link-arrow">' +
          '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>' +
        '</span>' +
      '</div>' +
      '<div class="link-name">' + escHtml(displayName) + '</div>' +
      (sizeStr ? '<div class="link-size">📦 ' + escHtml(sizeStr) + '</div>' : '') +
      '<div class="link-url-preview">' + escHtml(urlPreview) + '</div>';

    // Right-click → copy URL
    a.addEventListener("contextmenu", function (e) {
      e.preventDefault();
      copyText(link.url || "", a, "تم نسخ الرابط!");
    });

    return a;
  }

  function qualityClass(q) {
    if (!q) return "q-default";
    if (q.includes("1080")) return "q-1080";
    if (q.includes("720"))  return "q-720";
    if (q.includes("480"))  return "q-480";
    if (q.includes("360"))  return "q-360";
    return "q-default";
  }

  /* ── 4. Toolbar actions ───────────────────────────────────────── */
  window.expandAll = function () {
    document.querySelectorAll(".group-card.collapsed").forEach(function (c) {
      c.classList.remove("collapsed");
    });
    document.querySelectorAll(".group-card:not(.collapsed)").forEach(function (c) {
      c.classList.add("collapsed");
    });
  };

  window.copyAllLinks = function () {
    if (!payload || !payload.links) return;
    var allUrls = [];
    Object.values(payload.links).forEach(function (arr) {
      arr.forEach(function (l) { if (l.url) allUrls.push(l.url); });
    });
    copyText(allUrls.join("\n"), null, "تم نسخ " + allUrls.length + " رابط!");
  };

  /* ── 5. Helpers ───────────────────────────────────────────────── */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function show(id) {
    var el = document.getElementById(id);
    if (el) el.style.display = "";
  }

  function hideLoading() {
    var lo = document.getElementById("loading-overlay");
    if (lo) {
      lo.classList.add("hidden");
      setTimeout(function () { lo.style.display = "none"; }, 600);
    }
  }

  function showError(title, desc) {
    hideLoading();
    show("app");
    var sc = document.getElementById("state-container");
    sc.innerHTML =
      '<div class="state-card">' +
        '<div class="state-icon state-icon-error">⚠️</div>' +
        '<div class="state-title">' + escHtml(title) + '</div>' +
        '<div class="state-desc">' + escHtml(desc) + '</div>' +
        '<button class="btn btn-primary" onclick="history.back()">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>' +
          ' رجوع' +
        '</button>' +
      '</div>';
  }

  function showEmpty() {
    var sc = document.getElementById("state-container");
    sc.innerHTML =
      '<div class="state-card">' +
        '<div class="state-icon state-icon-empty">🔍</div>' +
        '<div class="state-title">لم يُعثر على روابط</div>' +
        '<div class="state-desc">تم استلام البيانات لكن لم يتم العثور على روابط تحميل في المحتوى.</div>' +
        '<button class="btn btn-primary" onclick="history.back()">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>' +
          ' رجوع' +
        '</button>' +
      '</div>';
  }

  /* ── 6. Toast + copy ──────────────────────────────────────────── */
  var toastTimer = null;
  function showToast(msg) {
    var toast = document.getElementById("toast");
    var tmsg  = document.getElementById("toast-msg");
    tmsg.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove("show");
    }, 2400);
  }

  function copyText(text, el, msg) {
    var done = function () {
      showToast(msg || "تم النسخ!");
      if (el) {
        el.classList.add("copied");
        setTimeout(function () { el.classList.remove("copied"); }, 1000);
      }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(function () { fallbackCopy(text, done); });
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      if (cb) cb();
    } catch (e) {}
  }

  /* ── 7. Clean up stale localStorage ──────────────────────────── */
  function cleanStorage() {
    try {
      var raw = localStorage.getItem(DATA_KEY);
      if (raw) {
        var p = JSON.parse(raw);
        if (p && p.timestamp && Date.now() - p.timestamp > 60 * 60 * 1000) {
          localStorage.removeItem(DATA_KEY);
        }
      }
    } catch (e) {}
  }

  /* ── Init ─────────────────────────────────────────────────────── */
  cleanStorage();
  bootstrap();

})();
</script>
